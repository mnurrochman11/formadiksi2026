<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Twibbon FORMADIKSI</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --text-main: #ffffff;
        --text-muted: #e2e8f0;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family:
          "Plus Jakarta Sans",
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
      }

      body {
        background-color: #0f172a;
        min-height: 100vh;
      }

      /* Hero Section dengan Gambar Latar */
      .hero-section {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        width: 100%;
        background-image: url("bg.jpeg");
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        position: relative;
        padding: 40px 20px;
      }

      /* Overlay Gelap Tipis khas iOS Dark Mode */
      .hero-section::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(15, 23, 42, 0.4);
        z-index: 1;
      }

      /* Glassmorphism Card Utama ala iOS */
      .hero-container {
        width: 100%;
        max-width: 600px;
        background: rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(25px);
        -webkit-backdrop-filter: blur(25px);
        border-radius: 36px;
        padding: 40px 32px;
        box-shadow:
          0 30px 60px rgba(0, 0, 0, 0.3),
          inset 0 1px 0 rgba(255, 255, 255, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: var(--text-main);
        position: relative;
        z-index: 2;
      }

      .header {
        text-align: center;
        margin-bottom: 24px;
      }

      .badge {
        display: inline-block;
        padding: 6px 18px;
        background: rgba(255, 255, 255, 0.15);
        color: #ffffff;
        font-size: 12px;
        font-weight: 700;
        border-radius: 50px;
        margin-bottom: 14px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(255, 255, 255, 0.25);
        backdrop-filter: blur(10px);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.3);
      }

      h1 {
        font-size: 28px;
        font-weight: 700;
        letter-spacing: -0.5px;
        margin-bottom: 10px;
        color: #ffffff;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
      }

      .desc {
        color: var(--text-muted);
        font-size: 14px;
        line-height: 1.6;
        text-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
      }

      .video-wrapper {
        background: rgba(0, 0, 0, 0.5);
        border-radius: 24px;
        overflow: hidden;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
        margin-bottom: 20px;
        border: 1px solid rgba(255, 255, 255, 0.15);
      }

      video {
        width: 100%;
        display: block;
        border-radius: 24px;
      }

      /* Base Button - Kapsul Glassmorphism ala iPhone */
      .btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        width: 100%;
        padding: 16px 24px;
        border: 1px solid rgba(255, 255, 255, 0.35);
        border-radius: 50px; /* Super rounded / pill style */
        font-size: 14.5px;
        font-weight: 600;
        cursor: pointer;
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        color: #ffffff;
        letter-spacing: 0.2px;
      }

      .btn:active {
        transform: scale(0.96);
      }

      /* Tombol Utama (Download) - Kaca Warna #ffaf00 (Oranye) */
      .btn-primary {
        background: rgba(255, 175, 0, 0.4);
        box-shadow:
          0 8px 25px rgba(255, 175, 0, 0.3),
          inset 0 1px 0 rgba(255, 255, 255, 0.5);
        margin-bottom: 28px;
      }

      .btn-primary:hover {
        background: rgba(255, 175, 0, 0.55);
        border-color: rgba(255, 255, 255, 0.6);
        box-shadow:
          0 10px 30px rgba(255, 175, 0, 0.45),
          inset 0 1px 0 rgba(255, 255, 255, 0.6);
      }

      /* Tombol Sekunder (Copy) - Kaca Warna #e4e4e4 (Abu-abu Netral) */
      .btn-success {
        background: rgba(228, 228, 228, 0.25);
        box-shadow:
          0 8px 25px rgba(0, 0, 0, 0.15),
          inset 0 1px 0 rgba(255, 255, 255, 0.4);
        margin-top: 12px;
      }

      .btn-success:hover {
        background: rgba(228, 228, 228, 0.4);
        border-color: rgba(255, 255, 255, 0.6);
        box-shadow:
          0 10px 30px rgba(0, 0, 0, 0.2),
          inset 0 1px 0 rgba(255, 255, 255, 0.6);
      }

      .caption-section {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      label {
        font-weight: 600;
        font-size: 14px;
        color: #ffffff;
        margin-left: 4px;
      }

      textarea {
        width: 100%;
        height: 190px;
        resize: none;
        padding: 18px;
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: rgba(0, 0, 0, 0.2);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        color: #ffffff;
        font-size: 13.5px;
        line-height: 1.6;
        outline: none;
        transition: all 0.2s ease;
        box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2);
      }

      textarea:focus {
        border-color: rgba(255, 255, 255, 0.5);
        background: rgba(0, 0, 0, 0.3);
        box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.1);
      }

      /* Toast Notification Glassmorphism */
      .toast {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%) translateY(20px);
        background: rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.3);
        color: white;
        padding: 12px 26px;
        border-radius: 50px;
        font-size: 14px;
        font-weight: 600;
        box-shadow:
          0 15px 35px rgba(0, 0, 0, 0.3),
          inset 0 1px 0 rgba(255, 255, 255, 0.4);
        opacity: 0;
        visibility: hidden;
        transition: all 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        display: flex;
        align-items: center;
        gap: 10px;
        z-index: 99;
      }

      .toast.show {
        opacity: 1;
        visibility: visible;
        transform: translateX(-50%) translateY(0);
      }

      @media (max-width: 640px) {
        .hero-container {
          padding: 28px 20px;
          border-radius: 28px;
        }
      }
    </style>
  </head>

  <body>
    <main class="hero-section">

        <div class="header">

          <label for="caption">Caption Instagram</label>

          <button class="btn btn-success" id="copyBtn" onclick="copyCaption()">
            <svg
              width="18"
              height="18"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"
              ></path>
            </svg>
            <span id="copyText">Salin Caption</span>
          </button>
        </div>
      </div>
    </main>

    <div id="toast" class="toast">
      <svg
        width="18"
        height="18"
        fill="none"
        stroke="#ffaf00"
        viewBox="0 0 24 24"
        xmlns="http://www.w3.org/2000/svg"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2.5"
          d="M5 13l4 4L19 7"
        ></path>
      </svg>
      <span>Caption berhasil disalin!</span>
    </div>

    <script>
      function copyCaption() {
        const text = document.getElementById("caption");
        const copyText = document.getElementById("copyText");

        navigator.clipboard.writeText(text.value);

        const toast = document.getElementById("toast");
        toast.classList.add("show");

        copyText.innerText = "Berhasil Disalin!";

        setTimeout(() => {
          toast.classList.remove("show");
          copyText.innerText = "Salin Caption";
        }, 2000);
      }

      function downloadVideo() {
        const link = document.createElement("a");
        link.href = "twibbon.mp4";
        link.download = "Twibbon_SAMBA_2026.mp4";
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      }
    </script>
  </body>
